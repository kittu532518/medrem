server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Proxy /api and /uploads to the backend (Cloud Run service)
    location /api/ {
        proxy_pass https://medrem-api-1052733864788.us-central1.run.app;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host medrem-api-1052733864788.us-central1.run.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    location /uploads/ {
        proxy_pass https://medrem-api-1052733864788.us-central1.run.app/uploads/;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host medrem-api-1052733864788.us-central1.run.app;
    }

    # Service worker — no cache
    location = /sw.js {
        expires off;
        add_header Cache-Control "no-cache, no-store";
    }

    # SPA fallback — all routes go to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
